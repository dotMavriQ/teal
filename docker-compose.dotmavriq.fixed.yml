version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: dotmavriq-web
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dotmavriq.rule=(Host(`dotmavriq.life`) || Host(`www.dotmavriq.life`)) && !PathPrefix(`/teal`)"
      - "traefik.http.routers.dotmavriq.priority=1"
      - "traefik.http.routers.dotmavriq.entrypoints=web,websecure"
      - "traefik.http.routers.dotmavriq.tls.certresolver=myhttpchallenge"
      - "traefik.http.routers.dotmavriq.middlewares=https_redirect@docker"
      - "traefik.http.services.dotmavriq-service.loadbalancer.server.port=80"

networks:
  web:
    external: true
