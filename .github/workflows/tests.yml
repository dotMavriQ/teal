name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  quality:
    name: Quality (Pint + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: none
          tools: composer:v2
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Install dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Generate key
        run: php artisan key:generate
      - name: Pint (style check)
        run: vendor/bin/pint --test
      - name: PHPStan (max, baseline-gated)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  rector:
    name: Rector (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: none
          tools: composer:v2
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Install dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Rector (dry-run, advisory)
        run: vendor/bin/rector process --dry-run --no-progress-bar

  tests:
    name: Tests (Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: teal_test
          POSTGRES_USER: teal
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, gd, pcntl, posix
        coverage: none
    - uses: actions/checkout@v4
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Generate key
      run: php artisan key:generate
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    - name: Install Frontend Dependencies
      run: npm install
    - name: Build Frontend Assets
      run: npm run build
    - name: Execute migrations
      env:
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: teal_test
        DB_USERNAME: teal
        DB_PASSWORD: password
      run: php artisan migrate --force
    - name: Execute tests (Unit and Feature tests) via Pest
      env:
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: teal_test
        DB_USERNAME: teal
        DB_PASSWORD: password
      run: php artisan test

  # ---------------------------------------------------------------------------
  # Build the production image, push to GHCR, and deploy to gerty.
  # Runs only on push to main, only after quality + tests are green.
  # Secrets stay on gerty (.env / .env.production); none are shipped from CI.
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy (prod)
    needs: [quality, tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/dotmavriq/teal:${{ github.sha }}
            ghcr.io/dotmavriq/teal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Cache the slow, stable stages (php-base extensions, composer deps)
          # but ALWAYS rebuild the frontend + final assembly fresh. This is the
          # fix for the stale-asset bug: the production stage was cache-restoring
          # its COPY --from=node-builder layer with old CSS. Forcing both stages
          # fresh guarantees deployed assets match source, while keeping builds
          # fast (extension compile + composer install stay cached).
          no-cache-filter: node-builder,production

      - name: Deploy to gerty (pull image, backup DB, migrate-guard, restart)
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.GERTY_HOST }}
          username: ${{ secrets.GERTY_USER }}
          key: ${{ secrets.GERTY_SSH_KEY }}
          command_timeout: 15m
          envs: GHCR_USER,GHCR_TOKEN,GIT_SHA
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/teal/app
            git fetch origin main
            git reset --hard origin/main
            TEAL_TAG="$GIT_SHA" ./docker/deploy-prod.sh
            docker logout ghcr.io || true
